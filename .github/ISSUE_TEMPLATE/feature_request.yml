name: ✨ Feature Request
description: Suggest a new feature for Baymax AI
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your feature request! Help us understand what you'd like to see in Baymax AI.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Describe the problem this feature would solve
      placeholder: "I want to be able to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe what you would like to happen
      placeholder: "The feature should..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Solutions (Optional)
      description: Any other approaches you've considered
      placeholder: "Other ideas..."

  - type: textarea
    id: context
    attributes:
      label: Additional Context (Optional)
      description: Any other context or screenshots
      placeholder: "Any other details..."

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I've checked existing feature requests
          required: true
        - label: This feature aligns with Baymax AI's scope
          required: true
