name: 🐛 Bug Report
description: Report a bug or issue with Baymax AI
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the form below to help us understand and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is
      placeholder: "What happened?"
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Upload resume...
        2. Click on...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What should happen instead?
      placeholder: "The app should..."
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your environment details
      placeholder: |
        - OS: macOS/Linux/Windows
        - Python version: (python --version)
        - Groq API: Working/Not working
      validations:
        required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Include any error messages or stack traces
      render: python
      placeholder: "Paste error logs here..."

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I've checked existing issues
          required: true
        - label: I've tried the troubleshooting guide in SETUP.md
          required: true
