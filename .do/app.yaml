name: baymax-app
region: nyc

# ─────────────────────────────────────────────────────────────────────────────
# BACKEND — FastAPI (Docker)
# Source dir: backend/   ← DO finds Dockerfile here
# ─────────────────────────────────────────────────────────────────────────────
services:
  - name: backend
    source_dir: /backend
    dockerfile_path: /backend/Dockerfile
    github:
      repo: taha-zaidii/baymax.app
      branch: main
      deploy_on_push: true
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8080
    health_check:
      http_path: /health
      initial_delay_seconds: 30
    envs:
      - key: GROQ_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: SERPER_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: FIRECRAWL_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: MEM0_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: GROQ_MODEL
        scope: RUN_TIME
        value: llama-3.3-70b-versatile
      - key: GROQ_MODEL_FAST
        scope: RUN_TIME
        value: llama-3.1-8b-instant
      - key: CHROMA_PERSIST_DIR
        scope: RUN_TIME
        value: /tmp/chroma_db
      - key: DEBUG
        scope: RUN_TIME
        value: "false"

# ─────────────────────────────────────────────────────────────────────────────
# FRONTEND — React/Vite (Docker)
# Source dir: frontend/  ← DO finds Dockerfile here
# ─────────────────────────────────────────────────────────────────────────────
  - name: frontend
    source_dir: /frontend
    dockerfile_path: /frontend/Dockerfile
    github:
      repo: taha-zaidii/baymax.app
      branch: main
      deploy_on_push: true
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8080
    routes:
      - path: /
    build_args:
      # DO automatically resolves this to the backend service's public URL
      VITE_API_URL: ${backend.PUBLIC_URL}
