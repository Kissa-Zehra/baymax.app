name: baymax-app
region: nyc

# ─────────────────────────────────────────────────────────────────────────────
# BACKEND — FastAPI (Python)
# ─────────────────────────────────────────────────────────────────────────────
services:
  - name: backend
    source_dir: backend
    github:
      repo: taha-zaidii/baymax.app
      branch: main
      deploy_on_push: true
    build_command: pip install -r requirements.txt
    run_command: uvicorn api:app --host 0.0.0.0 --port $PORT
    environment_slug: python
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8080
    health_check:
      http_path: /health
    envs:
      - key: GROQ_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: SERPER_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: FIRECRAWL_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: MEM0_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: GROQ_MODEL
        scope: RUN_TIME
        value: llama-3.3-70b-versatile
      - key: GROQ_MODEL_FAST
        scope: RUN_TIME
        value: llama-3.1-8b-instant
      - key: CHROMA_PERSIST_DIR
        scope: RUN_TIME
        value: /tmp/chroma_db
      - key: DEBUG
        scope: RUN_TIME
        value: "false"

# ─────────────────────────────────────────────────────────────────────────────
# FRONTEND — React/Vite (Static Site)
# ─────────────────────────────────────────────────────────────────────────────
static_sites:
  - name: frontend
    source_dir: frontend
    github:
      repo: taha-zaidii/baymax.app
      branch: main
      deploy_on_push: true
    build_command: npm install && npm run build
    output_dir: dist
    index_document: index.html
    error_document: index.html   # SPA — all routes → index.html
    envs:
      - key: VITE_API_URL
        scope: BUILD_TIME
        # DO App Platform injects the backend's public URL automatically
        value: ${backend.PUBLIC_URL}
